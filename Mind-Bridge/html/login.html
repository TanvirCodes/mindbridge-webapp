<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Bridge - Login</title>
  <!-- Stylesheets for login page -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <!-- Icon library -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
  <!-- Logo -->
      <div class="auth-logo">
        <i class="ph-fill ph-heartbeat"></i>
      </div>
      <h1 class="auth-title">Welcome to Mind Bridge</h1>
      <p class="auth-subtitle">North South University Student Support System</p>

  <!-- Role selector (Student, Peer, Supervisor) -->
      <div class="role-selector" id="roleSelector">
        <div class="role-option selected" data-role="student">Student</div>
        <div class="role-option" data-role="peer">Peer Supporter</div>
        <div class="role-option" data-role="supervisor">Supervisor</div>
      </div>

  <!-- Login form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address / NSU ID</label>
          <input type="text" class="form-control" placeholder="e.g., tanvir.shakib@northsouth.edu" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" placeholder="••••••••" required>
        </div>
  <!-- Sign In button -->
        <button type="button" class="btn btn--primary btn--full" onclick="handleLogin()" style="padding: 14px; font-size: 16px; margin-top: 8px;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script>
  // Role selection logic
  // Default: student
    let selectedRole = 'student';
  const roleOptions = document.querySelectorAll('.role-option');

  // Add click event to each role option
    roleOptions.forEach(option => {
      option.addEventListener('click', () => {
  // Remove 'selected' from all, then add to clicked
        roleOptions.forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
  // Update selectedRole
        selectedRole = option.getAttribute('data-role');
      });
    });

    // Handle login based on selected role
    function handleLogin() {
      // TODO: Add real authentication logic here later
      if (selectedRole === 'student') {
        window.location.href = 'index.html'; // Student Dashboard
      } else if (selectedRole === 'peer') {
        window.location.href = 'schedule.html'; // Peer Supporter views schedule
      } else if (selectedRole === 'supervisor') {
        window.location.href = 'clinical.html'; // Supervisor views high-risk cases
      }
    }
  </script>
</body>
</html>
