<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Bridge - Register</title>
  <!-- Stylesheets for register page -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <!-- Icon library -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width: 500px;">
      <h1 class="auth-title">Create an Account</h1>
      <p class="auth-subtitle">Join the NSU Mind Bridge community</p>

      <!-- Registration form -->
      <form>
        <div style="display: flex; gap: 16px;">
          <!-- Full Name -->
          <div class="form-group" style="flex: 1;">
            <label>Full Name</label>
            <input type="text" class="form-control" placeholder="" required>
          </div>
          <!-- NSU ID -->
          <div class="form-group" style="flex: 1;">
            <label>NSU ID</label>
            <input type="text" class="form-control" placeholder="" required>
          </div>
        </div>
        
  <!-- NSU Email -->
        <div class="form-group">
          <label>NSU Email</label>
          <input type="email" class="form-control" placeholder="" required>
        </div>

  <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" placeholder="Create a strong password" required>
        </div>
        
  <!-- Create Account button -->
        <button type="button" class="btn btn--primary btn--full" onclick="window.location.href='login.html'" style="padding: 14px; font-size: 16px; margin-top: 8px;">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
  <!-- Main JS for application logic -->
  <script src="../js/main.js"></script>
</body>
</html>
